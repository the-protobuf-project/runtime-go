version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
    labels:
      - dependencies

  # Go modules — one entry per workspace module
  - package-ecosystem: gomod
    directory: /ulid
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps/ulid)"
    labels:
      - dependencies

  - package-ecosystem: gomod
    directory: /resourcename
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps/resourcename)"
    labels:
      - dependencies

  - package-ecosystem: gomod
    directory: /config
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps/config)"
    labels:
      - dependencies

  - package-ecosystem: gomod
    directory: /network
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps/network)"
    labels:
      - dependencies

  - package-ecosystem: gomod
    directory: /grpc
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps/grpc)"
    labels:
      - dependencies

  - package-ecosystem: gomod
    directory: /system
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps/system)"
    labels:
      - dependencies
